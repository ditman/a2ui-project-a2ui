<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI GitHub Issue Triage Dashboard</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Marked Library for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for HTML Sanitization (XSS mitigation) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
      :root {
        --bg-base: #0d0e12;
        --bg-surface: #15171e;
        --bg-surface-elevated: #1e212b;
        --border-color: #2b2f3d;
        --border-focus: #4b5563;

        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;

        --accent-primary: #6366f1;
        --accent-hover: #4f46e5;

        /* Priority Colors */
        --color-p0: #ef4444;
        --color-p1: #f97316;
        --color-p2: #eab308;
        --color-p3: #10b981;
        --color-p4: #6b7280;

        --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-base);
        color: var(--text-primary);
        font-family: var(--font-sans);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Header Bar */
      header {
        background-color: var(--bg-surface);
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .brand-container {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .brand-logo {
        width: 1.75rem;
        height: 1.75rem;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-weight: 700;
        color: white;
        font-size: 0.9rem;
      }

      h1 {
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .global-actions {
        display: flex;
        gap: 0.75rem;
      }

      button {
        font-family: var(--font-sans);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: none;
      }

      .btn-secondary {
        background-color: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
      }

      .btn-secondary:hover {
        background-color: var(--bg-surface-elevated);
        color: var(--text-primary);
        border-color: var(--border-focus);
      }

      .btn-primary {
        background-color: var(--accent-primary);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-hover);
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
      }

      /* Custom Select Component for Multi-assignees */
      .custom-select-container {
        position: relative;
        width: 100%;
      }

      .custom-select-trigger {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.6rem;
        border-radius: 6px;
        font-size: 0.875rem;
        cursor: pointer;
        user-select: none;
        transition: border-color 0.2s ease;
      }

      .custom-select-container.active .custom-select-trigger {
        border-color: var(--accent-primary);
      }

      .custom-select-arrow {
        font-size: 0.75rem;
        color: var(--text-muted);
        transition: transform 0.2s ease;
      }

      .custom-select-container.active .custom-select-arrow {
        transform: rotate(180deg);
      }

      .custom-select-options {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background-color: var(--bg-surface-elevated);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        max-height: 250px;
        overflow-y: auto;
        z-index: 100;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        padding: 4px 0;
      }

      .custom-select-container.active .custom-select-options {
        display: block;
      }

      .custom-select-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0.6rem 0.8rem;
        font-size: 0.875rem;
        color: var(--text-primary);
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      .custom-select-option:hover {
        background-color: var(--bg-base);
      }

      .custom-select-option.disabled-header {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        cursor: default;
        background-color: transparent !important;
        padding-top: 0.8rem;
        padding-bottom: 0.3rem;
      }

      .custom-select-option.separator {
        height: 1px;
        background-color: var(--border-color);
        padding: 0;
        margin: 4px 0;
        cursor: default;
      }

      .custom-select-option input[type='checkbox'] {
        cursor: pointer;
        width: 14px;
        height: 14px;
        margin: 0;
      }

      .assignee-reason {
        margin-top: 0.4rem;
        font-size: 0.75rem;
        color: var(--text-secondary);
        font-style: italic;
        line-height: 1.35;
      }

      /* Custom Assignee Input */
      .custom-select-search-container {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        gap: 8px;
        background-color: var(--bg-surface);
      }

      .custom-select-search-container input {
        flex: 1;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.4rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .custom-select-search-container input:focus {
        border-color: var(--accent-primary);
      }

      .custom-select-search-container button {
        background-color: var(--accent-primary);
        color: white;
        border: none;
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .custom-select-search-container button:hover {
        background-color: var(--accent-hover);
      }

      /* Main Workspace Layout */
      .workspace {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Left Sidebar: Issue List */
      .sidebar {
        width: 24rem;
        border-right: 1px solid var(--border-color);
        background-color: var(--bg-surface);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .search-container {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
      }

      .search-input {
        width: 100%;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.6rem 0.8rem;
        border-radius: 6px;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .search-input:focus {
        border-color: var(--accent-primary);
      }

      .issue-list {
        flex: 1;
        overflow-y: auto;
        list-style: none;
      }

      .issue-item {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: background-color 0.2s ease;
        position: relative;
      }

      .issue-item:hover {
        background-color: var(--bg-surface-elevated);
      }

      .issue-item.active {
        background-color: var(--bg-surface-elevated);
        border-left: 3px solid var(--accent-primary);
        padding-left: calc(1rem - 3px);
      }

      .remaining-issues-item {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        background-color: rgba(66, 153, 225, 0.05); /* soft blue tint */
        color: var(--text-secondary);
        border-left: 3px solid rgba(66, 153, 225, 0.4);
        padding-left: calc(1rem - 3px);
      }

      .remaining-issues-content {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        line-height: 1.4;
      }

      .remaining-icon {
        font-size: 1rem;
      }

      .remaining-text {
        font-weight: 500;
        color: var(--text-secondary);
      }

      .issue-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }

      .issue-id {
        color: var(--text-muted);
        font-family: var(--font-display);
        font-size: 0.8rem;
        font-weight: 500;
      }

      .priority-badge {
        font-family: var(--font-display);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
        text-transform: uppercase;
        color: #fff;
      }

      .badge-p0 {
        background-color: var(--color-p0);
      }
      .badge-p1 {
        background-color: var(--color-p1);
      }
      .badge-p2 {
        background-color: var(--color-p2);
      }
      .badge-p3 {
        background-color: var(--color-p3);
      }
      .badge-p4 {
        background-color: var(--color-p4);
      }
      .badge-none {
        background-color: var(--text-muted);
      }

      .issue-title {
        font-size: 0.9rem;
        font-weight: 500;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-primary);
      }

      .issue-subtext {
        margin-top: 0.35rem;
        font-size: 0.75rem;
        color: var(--text-secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .reviewed-icon {
        color: var(--accent-primary);
        font-size: 0.85rem;
        font-weight: 700;
        display: none;
      }

      .issue-item.reviewed .reviewed-icon {
        display: inline;
      }

      /* Middle Pane: Issue Detail */
      .detail-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-color: var(--bg-base);
      }

      .detail-header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--border-color);
        background-color: var(--bg-surface);
        flex-shrink: 0;
      }

      .detail-title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .detail-title {
        font-family: var(--font-display);
        font-size: 1.35rem;
        font-weight: 600;
        line-height: 1.3;
      }

      .github-link {
        font-size: 0.8rem;
        color: var(--accent-primary);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
        margin-top: 0.35rem;
      }

      .github-link:hover {
        text-decoration: underline;
      }

      .detail-meta {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      .detail-body-container {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
      }

      .section-label {
        font-family: var(--font-display);
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
      }

      .issue-body {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        line-height: 1.6;
        font-size: 0.925rem;
        margin-bottom: 2rem;
      }

      /* Markdown Styles */
      .issue-body p {
        margin-bottom: 1rem;
      }
      .issue-body p:last-child {
        margin-bottom: 0;
      }
      .issue-body code {
        background-color: rgba(255, 255, 255, 0.08);
        padding: 0.15rem 0.3rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.85em;
      }
      .issue-body pre {
        background-color: #08090c;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        margin-bottom: 1rem;
        border: 1px solid var(--border-color);
      }
      .issue-body pre code {
        background-color: transparent;
        padding: 0;
        font-size: 0.85rem;
      }

      .comments-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .comment-card {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem 1.25rem;
      }

      .comment-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 0.35rem;
      }

      .comment-author {
        font-weight: 500;
        color: var(--text-primary);
      }

      .comment-body {
        font-size: 0.875rem;
        line-height: 1.5;
      }

      /* Right Pane: Triage Form */
      .triage-pane {
        width: 24rem;
        background-color: var(--bg-surface);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      /* Resizer Splitter Bar */
      .resizer {
        width: 4px;
        cursor: col-resize;
        background-color: var(--border-color);
        flex-shrink: 0;
        transition: background-color 0.15s ease;
        position: relative;
      }

      .resizer:hover,
      .resizer.dragging {
        background-color: var(--accent-primary);
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
      }

      .triage-pane-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
      }

      .triage-pane-title {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
      }

      .triage-form {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      select,
      textarea,
      input[type='text'] {
        width: 100%;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.6rem;
        border-radius: 6px;
        font-family: var(--font-sans);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s ease;
      }

      select:focus,
      textarea:focus,
      input[type='text']:focus {
        border-color: var(--accent-primary);
      }

      textarea {
        resize: vertical;
        min-height: 180px;
        line-height: 1.5;
        font-size: 0.85rem;
      }

      /* Label Checklist Multi-select */
      .label-checklist {
        border: 1px solid var(--border-color);
        background-color: var(--bg-base);
        border-radius: 6px;
        max-height: 150px;
        overflow-y: auto;
        padding: 0.5rem;
      }

      .label-check-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem 0.4rem;
        font-size: 0.8rem;
        cursor: pointer;
        border-radius: 4px;
        transition: background-color 0.15s ease;
      }

      .label-check-item:hover {
        background-color: rgba(255, 255, 255, 0.03);
      }

      .label-check-item input[type='checkbox'] {
        cursor: pointer;
      }

      .triage-actions {
        padding: 1.5rem;
        border-top: 1px solid var(--border-color);
        background-color: var(--bg-surface);
        flex-shrink: 0;
      }

      .btn-block {
        width: 100%;
        padding: 0.75rem;
        font-weight: 600;
      }

      /* Empty state */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem;
        text-align: center;
        color: var(--text-secondary);
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .empty-state h3 {
        font-family: var(--font-display);
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand-container">
        <div class="brand-logo">A2</div>
        <h1>A2UI Issue Triage</h1>
      </div>
      <div class="global-actions">
        <button class="btn-secondary" onclick="abortTriage()">Abort</button>
        <button class="btn-primary" onclick="saveAndApply()">Apply Triages</button>
      </div>
    </header>

    <div class="workspace">
      <!-- Left: Issues List -->
      <aside class="sidebar">
        <div class="search-container">
          <input
            type="text"
            class="search-input"
            id="searchBar"
            placeholder="Search issues..."
            oninput="filterIssues()"
          />
        </div>
        <ul class="issue-list" id="issueListContainer">
          <!-- Issue items dynamically loaded -->
        </ul>
      </aside>

      <!-- Middle: Detailed View -->
      <main class="detail-pane" id="detailPane">
        <div class="empty-state">
          <div class="empty-state-icon">📥</div>
          <h3>No Issue Selected</h3>
          <p>Select an issue from the sidebar to review details and begin triaging.</p>
        </div>
      </main>

      <!-- Pane Resizer Splitter -->
      <div class="resizer" id="paneResizer" style="visibility: hidden"></div>

      <!-- Right: Triage Decisions Panel -->
      <aside class="triage-pane" id="triagePane" style="visibility: hidden">
        <div class="triage-pane-header">
          <h3 class="triage-pane-title">Triage Decisions</h3>
        </div>
        <div class="triage-form">
          <div class="form-group">
            <label for="triagePriority">Suggested Priority</label>
            <select id="triagePriority" onchange="updateActiveDecision('priority', this.value)">
              <option value="None">None</option>
              <option value="P0">P0 - Urgent (Assignee Required)</option>
              <option value="P1">P1 - High Priority (Active/Soon)</option>
              <option value="P2">P2 - Medium Priority (Upcoming)</option>
              <option value="P3">P3 - Low Priority (Community Help)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Assignees</label>
            <div class="custom-select-container" id="assigneeDropdownContainer">
              <div
                class="custom-select-trigger"
                id="assigneeDropdownTrigger"
                onclick="toggleAssigneeDropdown(event)"
              >
                <span
                  id="assigneeDropdownValue"
                  style="font-style: italic; color: var(--text-muted)"
                  >Unassigned</span
                >
                <span class="custom-select-arrow">▼</span>
              </div>
              <div class="custom-select-options" id="assigneeDropdownOptions">
                <div class="custom-select-search-container" onclick="event.stopPropagation()">
                  <input
                    type="text"
                    id="assigneeCustomInput"
                    placeholder="Add custom GitHub login..."
                    onkeydown="handleCustomAssigneeKeyDown(event, activeIssueId)"
                  />
                  <button
                    type="button"
                    class="btn-add-custom"
                    onclick="addCustomAssignee(activeIssueId)"
                  >
                    Add
                  </button>
                </div>
                <div id="assigneeOptionsList">
                  <!-- Dynamically populated options with checkboxes -->
                </div>
              </div>
            </div>
            <div id="assigneeReason" class="assignee-reason" style="display: none"></div>
          </div>

          <div class="form-group">
            <label for="triageAction">Course of Action</label>
            <select id="triageAction" onchange="updateActiveDecision('action', this.value)">
              <option value="investigate">Keep open, mark for research</option>
              <option value="assign_and_fix">Keep open, assign to developer</option>
              <option value="needs_info">Ask for info, apply waiting-for-user-response</option>
              <option value="close_duplicate">Close as duplicate</option>
              <option value="close_invalid">Close as invalid/spam</option>
              <option value="close_resolved">Close as resolved/answered</option>
            </select>
          </div>

          <div class="form-group">
            <label>Repository Labels</label>
            <div class="label-checklist" id="labelChecklistContainer">
              <!-- Dynamic checkboxes -->
            </div>
          </div>

          <div class="form-group">
            <label for="triageReply">Response Draft</label>
            <textarea
              id="triageReply"
              placeholder="Draft a polite triage response..."
              oninput="updateActiveDecision('reply', this.value)"
            ></textarea>
          </div>
        </div>

        <div class="triage-actions">
          <button
            id="approveBtn"
            class="btn-primary btn-block"
            onclick="toggleActiveIssueApproval()"
          >
            Mark as Reviewed
          </button>
        </div>
      </aside>
    </div>

    <script>
      let repoData = {repo: '', issues: []};
      let decisions = {}; // keyed by issue ID
      let activeIssueId = null;

      const formatDate = dateStr => {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      };

      // Labels in the repository, populated dynamically from data on load
      const standardLabels = [];

      // Fetch comments and issue data on load
      // Render the assignee select dropdown dynamically for the active issue
      function toggleAssigneeDropdown(event) {
        event.stopPropagation();
        const container = document.getElementById('assigneeDropdownContainer');
        container.classList.toggle('active');
      }

      function renderAssigneeSelect(issue, currentSelectedValues) {
        const selectOptions = document.getElementById('assigneeOptionsList');
        const dropdownValueSpan = document.getElementById('assigneeDropdownValue');

        selectOptions.innerHTML = '';

        const selectedList = Array.isArray(currentSelectedValues) ? currentSelectedValues : [];
        const allAssignees = [...(repoData.assignees || [])]; // clone to avoid mutation
        const suggestedLogins = issue.suggestions.suggested_assignees || []; // Array of strings (logins)

        // Ensure all currently selected assignees are in allAssignees list
        selectedList.forEach(login => {
          if (!allAssignees.some(a => a.login === login)) {
            allAssignees.push({login: login, name: ''});
          }
        });

        // Ensure all original assignees of the issue are in allAssignees list (so they don't disappear when unchecked)
        const originalAssignees = Array.isArray(issue.assignees) ? issue.assignees : [];
        originalAssignees.forEach(login => {
          if (!allAssignees.some(a => a.login === login)) {
            allAssignees.push({login: login, name: ''});
          }
        });

        // Ensure all manually added custom assignees of the issue are in allAssignees list
        const customAssignees = Array.isArray(issue.custom_assignees) ? issue.custom_assignees : [];
        customAssignees.forEach(login => {
          if (!allAssignees.some(a => a.login === login)) {
            allAssignees.push({login: login, name: ''});
          }
        });

        // Update Trigger Value text display using real names where available
        if (selectedList.length === 0) {
          dropdownValueSpan.textContent = 'Unassigned';
          dropdownValueSpan.style.fontStyle = 'italic';
          dropdownValueSpan.style.color = 'var(--text-muted)';
        } else {
          const displayNames = selectedList.map(login => {
            const found = allAssignees.find(a => a.login === login);
            return found && found.name ? `${found.name} (${login})` : login;
          });
          dropdownValueSpan.textContent = displayNames.join(', ');
          dropdownValueSpan.style.fontStyle = 'normal';
          dropdownValueSpan.style.color = 'var(--text-primary)';
        }

        const formatOptionText = assigneeObj => {
          return assigneeObj.name
            ? `${assigneeObj.name} (${assigneeObj.login})`
            : assigneeObj.login;
        };

        const handleToggle = (login, isChecked) => {
          let newList = [...selectedList];
          if (isChecked) {
            if (!newList.includes(login)) newList.push(login);
          } else {
            newList = newList.filter(l => l !== login);
          }
          decisions[issue.id].assignee = newList;
          renderAssigneeSelect(issue, newList);
        };

        // 1. Unassigned Option
        const unassignedOpt = document.createElement('div');
        unassignedOpt.className = 'custom-select-option';
        unassignedOpt.style.fontStyle = 'italic';
        unassignedOpt.style.color = 'var(--text-muted)';
        unassignedOpt.textContent = 'Unassigned (Clear all)';
        unassignedOpt.onclick = e => {
          e.stopPropagation();
          decisions[issue.id].assignee = [];
          renderAssigneeSelect(issue, []);
        };
        selectOptions.appendChild(unassignedOpt);

        // 2. Suggested Section
        const suggestedObjects = [];
        suggestedLogins.forEach(login => {
          const found = allAssignees.find(a => a.login === login);
          if (found) {
            suggestedObjects.push(found);
          }
        });

        if (suggestedObjects.length > 0) {
          const headerOpt = document.createElement('div');
          headerOpt.className = 'custom-select-option disabled-header';
          headerOpt.textContent = '── Suggested Assignees ──';
          selectOptions.appendChild(headerOpt);

          suggestedObjects.forEach(obj => {
            const opt = document.createElement('div');
            opt.className = 'custom-select-option';

            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.checked = selectedList.includes(obj.login);
            chk.onclick = e => e.stopPropagation();
            chk.onchange = e => {
              handleToggle(obj.login, e.target.checked);
            };

            const label = document.createElement('span');
            label.textContent = formatOptionText(obj);

            opt.appendChild(chk);
            opt.appendChild(label);
            opt.onclick = () => {
              chk.checked = !chk.checked;
              handleToggle(obj.login, chk.checked);
            };

            selectOptions.appendChild(opt);
          });
        }

        // Separator
        if (suggestedObjects.length > 0) {
          const sep = document.createElement('div');
          sep.className = 'custom-select-option separator';
          selectOptions.appendChild(sep);
        }

        // 3. Other Section
        const otherObjects = allAssignees.filter(a => !suggestedLogins.includes(a.login));
        otherObjects.sort((a, b) => {
          const labelA = (a.name || a.login).toLowerCase();
          const labelB = (b.name || b.login).toLowerCase();
          return labelA.localeCompare(labelB);
        });

        if (suggestedObjects.length > 0 && otherObjects.length > 0) {
          const otherHeader = document.createElement('div');
          otherHeader.className = 'custom-select-option disabled-header';
          otherHeader.textContent = '── Other Contributors ──';
          selectOptions.appendChild(otherHeader);
        }

        otherObjects.forEach(obj => {
          const opt = document.createElement('div');
          opt.className = 'custom-select-option';

          const chk = document.createElement('input');
          chk.type = 'checkbox';
          chk.checked = selectedList.includes(obj.login);
          chk.onclick = e => e.stopPropagation();
          chk.onchange = e => {
            handleToggle(obj.login, e.target.checked);
          };

          const label = document.createElement('span');
          label.textContent = formatOptionText(obj);

          opt.appendChild(chk);
          opt.appendChild(label);
          opt.onclick = () => {
            chk.checked = !chk.checked;
            handleToggle(obj.login, chk.checked);
          };

          selectOptions.appendChild(opt);
        });
      }

      function handleCustomAssigneeKeyDown(event, issueId) {
        if (event.key === 'Enter') {
          event.preventDefault();
          addCustomAssignee(issueId);
        }
      }

      function addCustomAssignee(issueId) {
        const input = document.getElementById('assigneeCustomInput');
        if (!input) return;
        const login = input.value.trim();
        if (!login) return;

        const issue = repoData.issues.find(i => i.id === issueId);
        if (!issue) return;

        // Initialize custom_assignees list on the issue if not present
        issue.custom_assignees = issue.custom_assignees || [];
        if (!issue.custom_assignees.includes(login)) {
          issue.custom_assignees.push(login);
        }

        // Also add it to the active decision's assignee list if not already there
        let currentAssignees = decisions[issueId].assignee || [];
        if (!currentAssignees.includes(login)) {
          currentAssignees = [...currentAssignees, login];
          decisions[issueId].assignee = currentAssignees;
        }

        // Reset input
        input.value = '';

        // Re-render the select dropdown
        renderAssigneeSelect(issue, currentAssignees);
      }

      async function loadIssues() {
        try {
          const res = await fetch('/api/comments');
          if (!res.ok) throw new Error('Failed to fetch issue data');
          repoData = await res.json();

          // Dynamically override standard labels list with real repo labels if available,
          // filtering out priority labels (P0-P4) since they are managed via the priority dropdown.
          if (Array.isArray(repoData.labels) && repoData.labels.length > 0) {
            const filteredLabels = repoData.labels.filter(label => !/^[Pp][0-4]$/.test(label));
            standardLabels.splice(0, standardLabels.length, ...filteredLabels);
          }

          // Pre-populate decisions object with AI suggestions
          repoData.issues.forEach(issue => {
            const existingAssignees = Array.isArray(issue.assignees) ? issue.assignees : [];
            const initialAssignees =
              existingAssignees.length > 0
                ? existingAssignees
                : issue.suggestions.assignee
                  ? issue.suggestions.assignee
                      .split(',')
                      .map(a => a.trim())
                      .filter(Boolean)
                  : [];

            decisions[issue.id] = {
              id: issue.id,
              approved: false,
              priority: issue.suggestions.priority || 'None',
              assignee: initialAssignees,
              action: issue.suggestions.action || 'investigate',
              labels: issue.suggestions.labels || [],
              reply: issue.suggestions.reply || '',
            };
          });

          renderIssueList();
        } catch (err) {
          console.error(err);
          document.getElementById('detailPane').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon" style="color: var(--color-p0);">⚠️</div>
            <h3>Failed to Load Issues</h3>
            <p>${err.message}</p>
          </div>`;
        }
      }

      function renderIssueList() {
        const container = document.getElementById('issueListContainer');
        container.innerHTML = '';

        repoData.issues.forEach(issue => {
          const dec = decisions[issue.id];
          const pClass =
            dec.priority !== 'None' ? `badge-${dec.priority.toLowerCase()}` : 'badge-none';

          const li = document.createElement('li');
          li.className = `issue-item ${dec.approved ? 'reviewed' : ''} ${issue.id === activeIssueId ? 'active' : ''}`;
          li.id = `issue-item-${issue.id}`;
          li.onclick = () => selectIssue(issue.id);

          li.innerHTML = `
          <div class="issue-meta">
            <span class="issue-id">#${issue.id}</span>
            <span class="priority-badge ${pClass}" id="list-priority-badge-${issue.id}">${dec.priority}</span>
          </div>
          <div class="issue-title">${issue.title}</div>
          <div class="issue-subtext">
            <span>@${issue.author}</span>
            <span class="reviewed-icon">✓ Reviewed</span>
          </div>
        `;
          container.appendChild(li);
        });

        // Append remaining backlog info card if there are more issues
        if (repoData.total_issues_count && repoData.total_issues_count > repoData.issues.length) {
          const remaining = repoData.total_issues_count - repoData.issues.length;
          const li = document.createElement('li');
          li.className = 'remaining-issues-item';
          li.innerHTML = `
          <div class="remaining-issues-content">
            <span class="remaining-icon">ℹ️</span>
            <span class="remaining-text">${remaining} more issue${remaining > 1 ? 's' : ''} to be reviewed after these</span>
          </div>
        `;
          container.appendChild(li);
        }
      }

      function selectIssue(id) {
        activeIssueId = id;
        renderIssueList(); // refresh active highlight

        const issue = repoData.issues.find(i => i.id === id);
        const dec = decisions[id];

        // Render Details
        const detailPane = document.getElementById('detailPane');
        const cleanBody = DOMPurify.sanitize(
          marked.parse(issue.body || '*No description provided.*'),
        );

        let commentsHtml = '';
        if (issue.comments && issue.comments.length > 0) {
          commentsHtml = `
          <div class="section-label" style="margin-top: 2rem;">Comments (${issue.comments.length})</div>
          <div class="comments-container">
            ${issue.comments
              .map(
                c => `
              <div class="comment-card">
                <div class="comment-meta">
                  <span class="comment-author">@${c.author}</span>
                </div>
                <div class="comment-body">${DOMPurify.sanitize(marked.parse(c.body))}</div>
              </div>
            `,
              )
              .join('')}
          </div>
        `;
        } else {
          commentsHtml = `
          <div class="section-label" style="margin-top: 2rem;">Comments</div>
          <p style="font-size: 0.875rem; color: var(--text-muted); italic">No comments on this issue yet.</p>
        `;
        }

        detailPane.innerHTML = `
        <div class="detail-header">
          <div class="detail-title-row">
            <h2 class="detail-title">${issue.title}</h2>
          </div>
          <div class="detail-meta" style="margin-bottom: 0.5rem;">
            Opened by <strong>@${issue.author}</strong> • 
            <a class="github-link" href="https://github.com/${repoData.repo}/issues/${issue.id}" target="_blank">
              View on GitHub ↗
            </a>
          </div>
          <div class="detail-dates" style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 1.5rem; display: flex; gap: 16px;">
            <span>Opened: <strong>${formatDate(issue.createdAt)}</strong></span>
            <span>Last modified: <strong>${formatDate(issue.updatedAt || issue.createdAt)}</strong></span>
          </div>
        </div>
        <div class="detail-body-container">
          <div class="section-label">Description</div>
          <div class="issue-body">${cleanBody}</div>
          ${commentsHtml}
        </div>
      `;

        // Pre-fill Form Controls on Right
        document.getElementById('triagePane').style.visibility = 'visible';
        document.getElementById('paneResizer').style.visibility = 'visible';
        document.getElementById('triagePriority').value = dec.priority;

        // Dynamically populate assignee dropdown with sorted suggested contributors
        renderAssigneeSelect(issue, dec.assignee);

        // Clear custom assignee input when selecting a different issue
        const customInput = document.getElementById('assigneeCustomInput');
        if (customInput) {
          customInput.value = '';
        }

        // Populate suggested assignee reason if present
        const reasonEl = document.getElementById('assigneeReason');
        if (reasonEl) {
          const reason = issue.suggestions && issue.suggestions.assignee_reason;
          if (reason) {
            reasonEl.textContent = reason;
            reasonEl.style.display = 'block';
          } else {
            reasonEl.textContent = '';
            reasonEl.style.display = 'none';
          }
        }

        document.getElementById('triageAction').value = dec.action;
        document.getElementById('triageReply').value = dec.reply;

        // Load labels checkboxes
        renderLabelChecklist(dec.labels);

        // Update the approval toggle button state
        updateApproveButton(dec.approved);
      }

      function renderLabelChecklist(selectedLabels) {
        const container = document.getElementById('labelChecklistContainer');
        container.innerHTML = '';

        standardLabels.forEach(labelName => {
          const isChecked = selectedLabels.includes(labelName);
          const div = document.createElement('div');
          div.className = 'label-check-item';
          div.innerHTML = `
          <input type="checkbox" id="label-chk-${labelName}" ${isChecked ? 'checked' : ''} onchange="toggleLabelSelection('${labelName}')">
          <label style="text-transform: none; font-weight: normal; cursor: pointer; color: var(--text-primary)" for="label-chk-${labelName}">${labelName}</label>
        `;
          container.appendChild(div);
        });
      }

      function toggleLabelSelection(labelName) {
        if (!activeIssueId) return;
        const dec = decisions[activeIssueId];
        const index = dec.labels.indexOf(labelName);
        if (index === -1) {
          dec.labels.push(labelName);
        } else {
          dec.labels.splice(index, 1);
        }
      }

      function updateActiveDecision(field, value) {
        if (!activeIssueId) return;
        decisions[activeIssueId][field] = value;

        // Dynamically update priority badge in sidebar list
        if (field === 'priority') {
          const badge = document.getElementById(`list-priority-badge-${activeIssueId}`);
          if (badge) {
            badge.textContent = value;
            badge.className = `priority-badge ${value !== 'None' ? `badge-${value.toLowerCase()}` : 'badge-none'}`;
          }
        }
      }

      function updateApproveButton(approved) {
        const btn = document.getElementById('approveBtn');
        if (approved) {
          btn.textContent = 'Mark as Unreviewed';
          btn.className = 'btn-secondary btn-block';
        } else {
          btn.textContent = 'Mark as Reviewed';
          btn.className = 'btn-primary btn-block';
        }
      }

      function toggleActiveIssueApproval() {
        if (!activeIssueId) return;
        const dec = decisions[activeIssueId];
        const isApproving = !dec.approved;

        dec.approved = isApproving;

        const item = document.getElementById(`issue-item-${activeIssueId}`);
        if (item) {
          if (isApproving) {
            item.classList.add('reviewed');
          } else {
            item.classList.remove('reviewed');
          }
        }

        updateApproveButton(isApproving);

        // Sequential navigation: Only auto-select next issue when transitioning to APPROVED
        if (isApproving) {
          const currentIndex = repoData.issues.findIndex(issue => issue.id === activeIssueId);
          let nextIssue = null;
          for (let i = currentIndex + 1; i < repoData.issues.length; i++) {
            const issue = repoData.issues[i];
            if (!decisions[issue.id].approved) {
              nextIssue = issue;
              break;
            }
          }
          if (!nextIssue) {
            for (let i = 0; i < currentIndex; i++) {
              const issue = repoData.issues[i];
              if (!decisions[issue.id].approved) {
                nextIssue = issue;
                break;
              }
            }
          }

          if (nextIssue) {
            selectIssue(nextIssue.id);
          } else {
            alert(
              "All issues have been triaged! Click 'Apply Triages' to save and push to GitHub.",
            );
          }
        }
      }

      function filterIssues() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        repoData.issues.forEach(issue => {
          const li = document.getElementById(`issue-item-${issue.id}`);
          if (li) {
            const match =
              issue.title.toLowerCase().includes(q) || issue.author.toLowerCase().includes(q);
            li.style.display = match ? 'block' : 'none';
          }
        });
      }

              display: flex;

              align-items: center;

            ">
              <h4 style="font-size: 0.9rem; font-weight: 500; font-family: 'Outfit', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;">
                <a href="https://github.com/${repoData.repo}/issues/${d.id}" target="_blank" style="color: #9ca3af; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem;">
                  <span style="color: #6b7280; font-family: monospace;">#${d.id}</span> ${details.title}
                  <span style="font-size: 0.75rem; color: #6b7280;">↗</span>

              <span style="

                font-size: 0.75rem;

              <h3 style="font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #818cf8; border-bottom: 1px solid #2b2f3d; padding-bottom: 0.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <span>Applied / Triaged Issues</span>
                <span style="font-size: 0.8rem; background-color: rgba(99, 102, 241, 0.15); padding: 0.1rem 0.5rem; border-radius: 12px; color: #a5b4fc;">${triaged.length}</span>
              </h3>
              <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                ${triagedCardsHtml}
              </div>
            </div>
            
            <!-- Section 2: Left Unchanged -->
            <div>
              <h3 style="font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; border-bottom: 1px solid #2b2f3d; padding-bottom: 0.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <span>Left Unchanged</span>
                <span style="font-size: 0.8rem; background-color: rgba(156, 163, 175, 0.15); padding: 0.1rem 0.5rem; border-radius: 12px; color: #d1d5db;">${unchanged.length}</span>
              </h3>
              <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                ${unchangedCardsHtml}
              </div>
            </div>
            
          </div>
        </div>
      `;
      }

      async function saveAndApply() {
        // Map assignee array back to comma-separated string
        const decisionList = Object.values(decisions).map(d => ({
          ...d,
          assignee: Array.isArray(d.assignee) ? d.assignee.join(',') : d.assignee || '',
        }));

        try {
          const res = await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({decisions: decisionList}),
          });
          if (!res.ok) throw new Error('Failed to save triage decisions');

          renderSummaryPage(Object.values(decisions));
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }

      async function abortTriage() {
        if (confirm('Are you sure you want to abort issue triage? Your changes will be lost.')) {
          try {
            // Render the aborted page immediately
            document.body.innerHTML = `
            <div style="
              height: 100vh;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              background-color: #0d0e12;
              color: #f3f4f6;
              font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
              text-align: center;
              padding: 2rem;
            ">
              <div style="font-size: 4rem; margin-bottom: 1rem;">🛑</div>
              <h2 style="font-size: 1.75rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.02em;">Triage Session Aborted</h2>
              <p style="color: #9ca3af; font-size: 0.95rem; max-width: 24rem; line-height: 1.5; font-family: sans-serif;">The local server has been shut down. You can now safely close this browser tab.</p>
            </div>
          `;
            // Notify the backend to exit
            await fetch('/api/abort', {method: 'POST'});
          } catch (err) {
            console.error(err);
          }
        }
      }

      // Draggable Splitter/Resizer Logic
      function initResizer() {
        const resizer = document.getElementById('paneResizer');
        const triagePane = document.getElementById('triagePane');

        const savedWidth = localStorage.getItem('triagePaneWidth');
        if (savedWidth) {
          triagePane.style.width = savedWidth;
        }

        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener('mousedown', e => {
          e.preventDefault();
          startX = e.clientX;
          startWidth = triagePane.getBoundingClientRect().width;

          resizer.classList.add('dragging');

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
        });

        function onMouseMove(e) {
          const dx = e.clientX - startX;
          let newWidth = startWidth - dx;

          if (newWidth < 280) newWidth = 280;
          if (newWidth > 600) newWidth = 600;

          triagePane.style.width = `${newWidth}px`;
        }

        function onMouseUp() {
          resizer.classList.remove('dragging');
          localStorage.setItem('triagePaneWidth', triagePane.style.width);

          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        }
      }

      // Initialize
      window.onload = () => {
        loadIssues();
        initResizer();

        // Close custom select dropdown on click outside
        document.addEventListener('click', () => {
          const container = document.getElementById('assigneeDropdownContainer');
          if (container) {
            container.classList.remove('active');
          }
        });
      };
    </script>
  </body>
